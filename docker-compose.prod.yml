# Production docker-compose file
# Use with: docker-compose -f docker-compose.prod.yml up -d

x-backend-env: &backend-env
  DEBUG: "False"
  SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
  POSTGRES_DB: ${POSTGRES_DB:-crypto_monitor}
  POSTGRES_USER: ${POSTGRES_USER:-postgres}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_HOST: db
  POSTGRES_PORT: "5432"
  CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD}@rabbitmq:5672//
  CELERY_RESULT_BACKEND: django-db

x-backend-service: &backend-service
  build:
    context: ./backend
    dockerfile: Dockerfile
  restart: always

services:
  db:
    image: postgres:15-alpine
    container_name: crypto_monitor_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crypto_monitor}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-alpine
    container_name: crypto_monitor_rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    <<: *backend-service
    container_name: crypto_monitor_backend
    command: >
      sh -c "python manage.py migrate &&
             gunicorn --bind 0.0.0.0:8000 --workers 4 config.wsgi:application"
    environment:
      <<: *backend-env
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://yourdomain.com}
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  celery_worker:
    <<: *backend-service
    container_name: crypto_monitor_celery_worker
    command: celery -A config worker -l warning -c 4
    environment: *backend-env
    depends_on:
      - backend
      - rabbitmq

  celery_beat:
    <<: *backend-service
    container_name: crypto_monitor_celery_beat
    command: celery -A config beat -l warning
    environment: *backend-env
    depends_on:
      - backend
      - rabbitmq

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crypto_monitor_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  rabbitmq_data:
